# Isolated SkyCoach deployment — does NOT touch the host VPN stack.
# Built from the git checkout on the server: `cd deploy && docker compose up -d --build`.
# - app:   Next.js standalone server (internal :3000, not published)
# - caddy: TLS reverse proxy on the host's FREE :443, automatic Let's Encrypt
#          via TLS-ALPN-01 (host :80 is the VPN's nginx; :443 is free).
#
# `name:` pins the Compose project so the caddy_data volume name (and the issued
# LE certificate inside it) is stable regardless of the working directory.
name: skycoach-advisor

services:
  app:
    build:
      context: .. # repo root
      dockerfile: deploy/Dockerfile
    image: skycoach-app:latest
    container_name: skycoach_app
    environment:
      - NODE_ENV=production
      - DEMO_MODE=0
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - skycoach

  caddy:
    image: caddy:2-alpine
    container_name: skycoach_caddy
    depends_on:
      - app
    ports:
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists the LE cert across restarts
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - skycoach

networks:
  skycoach:
    name: skycoach_net

volumes:
  caddy_data:
  caddy_config:
